apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-as-a-claim
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/girishn/kafka-as-a-claim
    targetRevision: master
    path: crossplane/claims
  destination:
    server: https://kubernetes.default.svc
    namespace: team-payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
